server {
    listen                  443 ssl;
    http2 on;

    server_name             ${APP_URL};
    root                    ${NGINX_ROOT};

    # SSL
    ssl_certificate         /etc/letsencrypt/live/${APP_URL}/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/${APP_URL}/privkey.pem;

    # index.php
    index                   index.php index.html index.htm;

    # index.php fallback
    location / {
        add_header 'Access-Control-Allow-Origin' 'https://localhost:3000';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
        try_files  $uri $uri/ /index.php?$query_string;
    }

    # handle .php
    location ~ \.php$ {
        include             extras/php_fastcgi.conf;
    }

    # ACME-challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www;
    }

    # Additional
    # ${WORDPRESS}

}

# Redirect to SSL
server {
    listen      80;
    server_name ${APP_URL};

    return                  301 https://${APP_URL}$request_uri;
}

# Sub Domains Redirect
server {
    listen                  443 ssl;
    http2 on;
    server_name             *.${APP_URL};

    # SSL
    ssl_certificate /etc/letsencrypt/live/${APP_URL}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${APP_URL}/privkey.pem;

    return                  301 https://${APP_URL}$request_uri;
}
