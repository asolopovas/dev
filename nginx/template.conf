server {
    listen                  443 ssl;
    http2 on;
    #listen                  [::]:443 ssl http2;
    server_name             ${APP_URL};
    root                    ${NGINX_ROOT};

    # SSL
    ssl_certificate         /etc/letsencrypt/live/${APP_URL}/fullchain.pem; # managed by Certbot
    ssl_certificate_key     /etc/letsencrypt/live/${APP_URL}/privkey.pem; # managed by Certbot

    # security
    include                 extras/security.conf;

    # index.php
    index                   index.php index.html index.htm;

    # index.php fallback
    location / {
        try_files           $uri $uri/ /index.php?$query_string;
        include             extras/cors.conf;
    }

    # additional config
    include                 extras/general.conf;
    # ${WORDPRESS}

    # handle .php
    location ~ \.php$ {
        #try_files           $uri /index.php =404;
        include             extras/php_fastcgi.conf;
        include             extras/cors.conf;

    }

    # Docker
    # access_log              /dev/stdout;
    # error_log               /dev/stderr;
}

# subdomains redirect
server {
    listen                  443 ssl;
    http2 on;
    #listen                  [::]:443 ssl http2;
    server_name             *.${APP_URL};

    # SSL
    ssl_certificate /etc/letsencrypt/live/${APP_URL}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${APP_URL}/privkey.pem;

    return                  301 https://${APP_URL}$request_uri;
}

# HTTP redirect
server {
    listen      80;
    #listen      [::]:80;
    server_name ${APP_URL};
    # include     extras/letsencrypt.conf;
    root                    ${NGINX_ROOT};

    # security
    include                 extras/security.conf;
    # index.php
    index                   index.php index.html index.htm;
    # index.php fallback
    location / {
        try_files           $uri $uri/ /index.php?$query_string;
    }
    # additional config
    include                 extras/general.conf;

    # ${WORDPRESS}

    # handle .php
    location ~ \.php$ {
        include             extras/php_fastcgi.conf;
    }

}
