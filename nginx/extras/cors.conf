if ($request_method = 'OPTIONS') {
    add_header 'Access-Control-Allow-Origin' 'https://localhost:3000' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,x-wp-nonce';
    add_header 'Access-Control-Allow-Credentials' 'true' always; # Add this line
    add_header 'Access-Control-Max-Age' 1728000;
    add_header 'Content-Type' 'text/plain; charset=utf-8';
    add_header 'Content-Length' 0;
    return 204;
}

if ($request_method = 'POST') {
    add_header 'Access-Control-Allow-Origin' 'https://localhost:3000' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,x-wp-nonce' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always; # Add this line
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
}

if ($request_method = 'GET') {
    add_header 'Access-Control-Allow-Origin' 'https://localhost:3000' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,x-wp-nonce' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always; # Add this line
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
}
