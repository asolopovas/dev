# Allow all fonts to be used cross-origin (simplified)
@fontFiles {
    path_regexp fonts /\.(woff2?|ttf|otf)$
}
header @fontFiles {
    Access-Control-Allow-Origin "*"
    Access-Control-Allow-Methods "GET, OPTIONS"
    Access-Control-Allow-Headers "*"
    Cache-Control "no-cache"
}

# Allow API requests from localhost:3000 (dev)
@restCors {
    path /wp-json/*
}
header @restCors {
    Access-Control-Allow-Origin "*"
    Access-Control-Allow-Credentials "true"
    Access-Control-Allow-Headers "*"
    Access-Control-Allow-Methods "*"
}

@restPreflight {
    method OPTIONS
    path /wp-json/*
}
respond @restPreflight 204

# Allow admin requests from localhost:3000 (dev)
@adminPaths {
    path /wp-admin/*
    path /wp-login.php
}
header @adminPaths {
    Access-Control-Allow-Origin "*"
    Access-Control-Allow-Credentials "true"
    Access-Control-Allow-Headers "*"
    Access-Control-Allow-Methods "*"
}

@adminPreflight {
    method OPTIONS
    path /wp-admin/*
    path /wp-login.php
}
respond @adminPreflight 204

# Allow all static assets to be used cross-origin
@staticFiles {
    file
    path /wp-content/uploads/*
    path /wp-content/themes/*
    path /wp-content/plugins/*
}
header @staticFiles {
    Access-Control-Allow-Origin "*"
    Access-Control-Allow-Methods "GET, OPTIONS"
    Access-Control-Allow-Headers "*"
    Cache-Control "no-cache"
}
